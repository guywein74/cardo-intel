name: Daily Competitive Research Refresh

on:
  schedule:
    # Run every day at 9 AM UTC (adjustable)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  daily-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: Configure Git
        run: |
          git config --global user.name "claude-cardo-bot"
          git config --global user.email "bot@cardo-intel.local"

      - name: Run Cardo research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_agent.py cardo
          echo "✅ Cardo research complete"

      - name: Run Sena research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_agent.py sena
          echo "✅ Sena research complete"

      - name: Run ASMAX research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_agent.py asmax
          echo "✅ ASMAX research complete"

      - name: Run Reso research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_agent.py reso
          echo "✅ Reso research complete"

      - name: Run Social Media Listener agent (Reddit)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/social_media_listener.py
          echo "✅ Social Media Listener complete"

      - name: Run Apify Social Listener (Facebook Groups + Instagram)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: |
          python scripts/apify_social_listener.py
          echo "✅ Apify Social Listener complete"

      - name: Run Product Expert agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/product_expert.py
          echo "✅ Product Expert analysis complete"

      - name: Build dashboard
        run: |
          python build.py
          echo "✅ Dashboard built successfully"

      - name: Validate JavaScript
        run: |
          if command -v node &> /dev/null; then
            sed -n '/<script>/,/<\/script>/p' dashboard.html | sed '1d;$d' > /tmp/check.js
            node -c /tmp/check.js
            echo "✅ JavaScript validation passed"
          else
            echo "⚠️ Node.js not available, skipping JS validation"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected - will commit"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add research/*.json dashboard.html index.html
          git commit -m "Daily data refresh $(date +%Y-%m-%d)"
          git push origin HEAD:main
          echo "✅ Changes pushed to GitHub"

      - name: Verify deployment
        run: |
          echo "Waiting for GitHub Pages to update..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://guywein74.github.io/cardo-intel/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Dashboard is live at https://guywein74.github.io/cardo-intel/"
          else
            echo "⚠️ Dashboard returned status $STATUS (may still be rebuilding)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "=== Daily Refresh Summary ==="
          echo "Date: $(date -u)"
          echo "Status: ${{ job.status }}"
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "Result: ✅ Updates committed and published"
          else
            echo "Result: ℹ️ No changes to commit"
          fi

  notify-failure:
    runs-on: ubuntu-latest
    needs: daily-refresh
    if: failure()
    steps:
      - name: Log failure
        run: |
          echo "❌ Daily refresh workflow failed!"
          echo "Check the logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
