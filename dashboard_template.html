<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardo Competitive Intelligence — July 2026</title>
<style>
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2d3644; --text:#e6edf3; --muted:#8b949e;
  --cardo:#e6002d; --sena:#f7a600; --asmax:#22c1dd; --reso:#8e6bff;
  --ok:#3fb950; --warn:#d29922; --bad:#f85149; --partial:#a371f7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:60px}
header{padding:28px 32px 0}
h1{font-size:24px;font-weight:700}
h1 .accent{color:var(--cardo)}
.sub{color:var(--muted);margin-top:4px;font-size:13px}
nav{display:flex;gap:4px;padding:18px 32px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
nav button{background:none;border:none;color:var(--muted);font:600 14px inherit;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent}
nav button.active{color:var(--text);border-bottom-color:var(--cardo)}
nav button:hover{color:var(--text)}
main{padding:24px 32px;max-width:1400px;margin:0 auto}
.tab{display:none}.tab.active{display:block}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(420px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px}
.card h3{font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
.badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px}
.b-critical{background:#3d1418;color:#ff7b72}.b-high{background:#3b2300;color:#f0a83a}.b-medium{background:#272040;color:#b79df5}.b-low{background:#0f2b17;color:#56d364}
.b-leads{background:#0f2b17;color:#56d364}.b-parity{background:#1a2634;color:#79b8ff}.b-partial{background:#272040;color:#b79df5}.b-behind{background:#3b2300;color:#f0a83a}.b-missing{background:#3d1418;color:#ff7b72}.b-at-risk{background:#3d1418;color:#ff7b72}
.muted{color:var(--muted)}.small{font-size:12px}
table{width:100%;border-collapse:collapse}
th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th .arrow{opacity:.7}
td{padding:9px 10px;border-bottom:1px solid #1f2733;vertical-align:top}
tbody tr.prod{cursor:pointer}
tbody tr.prod:hover{background:var(--panel2)}
tr.expand td{background:#11161d;font-size:13px;color:#c9d1d9;padding:14px 16px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.chip{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:16px;padding:5px 14px;cursor:pointer;font:600 13px inherit}
.chip.on{color:var(--text);border-color:currentColor}
input[type=search],select{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font:inherit}
.brandtag{font-weight:700}
.price{font-variant-numeric:tabular-nums;white-space:nowrap}
.strike{color:var(--muted);text-decoration:line-through;font-size:12px}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0;font-size:12px;color:var(--muted);align-items:center}
.matrix td,.matrix th{text-align:center}
.matrix td:first-child,.matrix th:first-child{text-align:left}
.sym{font-size:16px;font-weight:700}
.s-yes{color:var(--ok)}.s-no{color:var(--bad)}.s-part{color:var(--partial)}
.fnote{font-size:11px;color:var(--muted);margin-top:2px}
.reclist{counter-reset:rec}
.rec{display:flex;gap:14px;margin-bottom:12px}
.rec .n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--cardo);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center}
.kv{display:flex;justify-content:space-between;gap:10px;padding:4px 0;border-bottom:1px dashed #232c3a;font-size:13px}
.kv:last-child{border:none}
.kv b{font-variant-numeric:tabular-nums}
.two{columns:2;column-gap:28px}
@media(max-width:900px){.two{columns:1}}
ul.tight{padding-left:18px}
ul.tight li{margin-bottom:5px}
.news{border-left:2px solid var(--border);padding-left:14px;margin-left:4px}
.news div{margin-bottom:8px}
.news b{color:var(--muted);font-size:12px;margin-right:8px}
.gapseg{margin-bottom:16px}
.gapseg .comp{margin:8px 0 0;padding-left:0;list-style:none}
.gapseg .comp li{padding:6px 0;border-top:1px dashed #232c3a;font-size:13px}
svg text{fill:var(--muted);font-size:11px}
.tt{position:fixed;pointer-events:none;background:#000c;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;z-index:9;display:none;max-width:280px}
.note-banner{background:#131a24;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--muted);font-size:12px;margin-bottom:16px}
h2{font-size:18px;margin:26px 0 12px}
h2:first-child{margin-top:0}
a{color:#58a6ff;text-decoration:none}
</style>
</head>
<body>
<header>
  <h1>Cardo <span class="accent">Competitive Intelligence</span></h1>
  <div class="sub">Cardo vs Sena vs ASMAX vs Reso · compiled by research agents · data as of July 2026</div>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div class="tt" id="tt"></div>
<script>
const DATA = /*__DATA__*/;
const GAP = DATA.gap;
const BRANDS = DATA.brands;
const BCOLOR = {Cardo:"var(--cardo)",Sena:"var(--sena)",ASMAX:"var(--asmax)",Reso:"var(--reso)"};
const BHEX = {Cardo:"#e6002d",Sena:"#f7a600",ASMAX:"#22c1dd",Reso:"#8e6bff"};
const TABS = ["Overview","Products","Battles","Model Compare","Pricing","Gap Analysis","Social & Press","Software & Firmware"];
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt$ = v => v==null?"—":"$"+Number(v).toLocaleString(undefined,{maximumFractionDigits:2});
const dot = b => `<span class="dot" style="background:${BCOLOR[b]}"></span>`;

/* products flattened */
let PRODUCTS=[];
BRANDS.forEach(br=>br.products.forEach(p=>PRODUCTS.push({brand:br.competitor,...p})));
PRODUCTS.forEach(p=>{p.eff=(p.street_price_usd??p.msrp_usd);p.isHelmet=/helmet/i.test(p.name);p.cat=p.category||(p.isHelmet?"smart_helmet":"communicator");p.mesh=/mesh|dmc/i.test(p.intercom_tech||"")&&!/no mesh/i.test(p.intercom_tech||"")});

/* ---------- nav ---------- */
const nav=document.getElementById("nav"),main=document.getElementById("main");
TABS.forEach((t,i)=>{const b=document.createElement("button");b.textContent=t;b.onclick=()=>show(i);nav.appendChild(b)});
const sections=TABS.map(()=>{const d=document.createElement("div");d.className="tab";main.appendChild(d);return d});
function show(i){[...nav.children].forEach((b,j)=>b.classList.toggle("active",i===j));sections.forEach((s,j)=>s.classList.toggle("active",i===j))}

/* ---------- Overview (2x2 matrix) ---------- */
sections[0].innerHTML = `
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
  <!-- Top-left: Brand overview -->
  <div class="card">
    <h2 style="margin-top:0">Brand overview</h2>
    ${BRANDS.map(b=>`<div style="margin-bottom:14px"><div style="font-weight:700;margin-bottom:4px">${dot(b.competitor)}${esc(b.competitor)}</div>
      <div class="small muted">${esc(b.company.hq.split(";")[0].split("(")[0])} · Founded ${esc((b.company.founded||"").match(/\d{4}/)?.[0]||"")}</div>
      <div class="small" style="margin-top:4px">${esc(b.company.positioning.split(";")[0].slice(0,140))}…</div>
      <div class="kv" style="padding:4px 0;border:none;font-size:12px"><span>Products</span><b>${b.products.length}</b></div>
      <div class="kv" style="padding:4px 0;border:none;font-size:12px"><span>Price range</span><b>${(()=>{const ps=b.products.map(p=>p.street_price_usd??p.msrp_usd).filter(v=>v!=null);return ps.length?fmt$(Math.min(...ps))+"-"+fmt$(Math.max(...ps)):"—"})()}</b></div></div>`).join("")}
  </div>

  <!-- Top-right: Strengths & weaknesses matrix -->
  <div class="card">
    <h2 style="margin-top:0">Competitive positioning</h2>
    <table style="font-size:12px;margin-bottom:8px">
      <thead><tr><th style="padding:6px">Brand</th><th style="padding:6px">Strengths</th><th style="padding:6px">Weaknesses</th></tr></thead>
      <tbody>
      ${BRANDS.map(b=>`<tr><td style="font-weight:700;padding:6px">${esc(b.competitor)}</td>
        <td style="padding:6px;color:var(--ok);font-size:11px">${b.strengths.slice(0,2).map(s=>esc(s.split(" - ")[0].split(" — ")[0].slice(0,60))).join(" • ")}</td>
        <td style="padding:6px;color:var(--bad);font-size:11px">${b.weaknesses.slice(0,2).map(s=>esc(s.split(" - ")[0].split(" — ")[0].slice(0,60))).join(" • ")}</td></tr>`).join("")}
      </tbody>
    </table>
  </div>

  <!-- Bottom-left: Recent moves -->
  <div class="card">
    <h2 style="margin-top:0">Recent moves (2025–2026)</h2>
    ${BRANDS.map(b=>`<div style="margin-bottom:12px"><div style="font-weight:600;font-size:12px;margin-bottom:4px">${dot(b.competitor)}${esc(b.competitor)}</div>
      <div class="small muted" style="font-size:11px">${(b.recent_news||[]).slice(-3).reverse().map(n=>`<div style="margin:2px 0"><span style="color:var(--text);font-weight:600">${esc(n.date||"")}</span> ${esc(n.headline.slice(0,120))}</div>`).join("")}</div></div>`).join("")}
  </div>

  <!-- Bottom-right: Press & market -->
  <div class="card">
    <h2 style="margin-top:0">Press coverage & market</h2>
    <table style="font-size:12px">
      <thead><tr><th style="padding:6px">Brand</th><th style="padding:6px">Reviews</th><th style="padding:6px">Awards</th><th style="padding:6px">Tone</th></tr></thead>
      <tbody>
      ${BRANDS.map(b=>{const p=b.press_coverage||{};const tone=(p.overall_tone||"").split(/[.;—-]/)[0].slice(0,35);return `<tr><td style="font-weight:700;padding:6px">${esc(b.competitor)}</td>
        <td style="padding:6px;text-align:center">${(p.reviews||[]).length}</td>
        <td style="padding:6px;text-align:center">${(p.awards||[]).length}</td>
        <td style="padding:6px;font-size:11px;color:var(--muted)">${esc(tone)}</td></tr>`}).join("")}
      </tbody>
    </table>
  </div>
</div>`;

/* ---------- Products table ---------- */
const COLS=[["name","Product"],["brand","Brand"],["tier","Tier"],["msrp_usd","MSRP"],["street_price_usd","Street"],["intercom_tech","Intercom"],["range_km","Range km"],["max_riders","Riders"],["talk_time_hours","Talk h"],["waterproof","Waterproof"],["release_year","Year"]];
const YEARS=Array.from(new Set(PRODUCTS.map(p=>p.release_year).filter(y=>y))).sort((a,b)=>b-a);
const TIER_ORDER=["flagship","mid","entry"];
const tiersFor=cat=>{const s=new Set(PRODUCTS.filter(p=>cat==="all"||p.cat===cat).map(p=>p.tier).filter(Boolean));return TIER_ORDER.filter(t=>s.has(t)).concat([...s].filter(t=>!TIER_ORDER.includes(t)))};
const tierOpts=cat=>`<option value="all">All tiers</option>`+tiersFor(cat).map(t=>`<option>${esc(t)}</option>`).join("");
let sortKey="eff",sortDir=1,fBrands=new Set(BRANDS.map(b=>b.competitor)),fCat="all",fTier="all",fYear="all",fMesh=false,fSearch="";
sections[1].innerHTML=`
  <div class="chips">
    ${BRANDS.map(b=>`<button class="chip on" data-b="${b.competitor}" style="color:${BCOLOR[b.competitor]}">${b.competitor}</button>`).join("")}
    <select id="catSel"><option value="all">All categories</option><option value="communicator">Communicators</option><option value="smart_helmet">Smart helmets</option></select>
    <select id="tierSel">${tierOpts("all")}</select>
    <select id="yearSel"><option value="all">All years</option>${YEARS.map(y=>`<option value="${y}">${y}</option>`).join("")}</select>
    <button class="chip" id="meshChip">Mesh only</button>
    <input type="search" id="srch" placeholder="Search product / feature…" style="flex:1;min-width:180px">
    <span class="small muted" id="count"></span>
  </div>
  <div class="card" style="padding:0;overflow-x:auto">
  <table id="ptable"><thead><tr>${COLS.map(([k,l])=>`<th data-k="${k}">${l} <span class="arrow"></span></th>`).join("")}</tr></thead><tbody></tbody></table></div>
  <div class="small muted" style="margin-top:8px">Click a row for features & notes. Street price shown where verified; "—" = not published / not found.</div>`;
sections[1].querySelectorAll(".chip[data-b]").forEach(c=>c.onclick=()=>{const b=c.dataset.b;c.classList.toggle("on");c.classList.contains("on")?fBrands.add(b):fBrands.delete(b);renderTable()});
sections[1].querySelector("#catSel").onchange=e=>{fCat=e.target.value;fTier="all";const ts=sections[1].querySelector("#tierSel");ts.innerHTML=tierOpts(fCat);ts.value="all";renderTable()};
sections[1].querySelector("#tierSel").onchange=e=>{fTier=e.target.value;renderTable()};
sections[1].querySelector("#yearSel").onchange=e=>{fYear=e.target.value;renderTable()};
sections[1].querySelector("#meshChip").onclick=e=>{fMesh=!fMesh;e.target.classList.toggle("on",fMesh);renderTable()};
sections[1].querySelector("#srch").oninput=e=>{fSearch=e.target.value.toLowerCase();renderTable()};
sections[1].querySelectorAll("th").forEach(th=>th.onclick=()=>{const k=th.dataset.k;sortDir=(sortKey===k)?-sortDir:1;sortKey=k;renderTable()});
function renderTable(){
  const tb=sections[1].querySelector("tbody");
  let rows=PRODUCTS.filter(p=>fBrands.has(p.brand)&&(fCat==="all"||p.cat===fCat)&&(fTier==="all"||p.tier===fTier)&&(fYear==="all"||p.release_year==fYear)&&(!fMesh||p.mesh)&&(!fSearch||JSON.stringify(p).toLowerCase().includes(fSearch)));
  rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(x==null)return 1;if(y==null)return -1;return (typeof x==="number"?x-y:String(x).localeCompare(String(y)))*sortDir});
  sections[1].querySelectorAll("th .arrow").forEach(a=>a.textContent="");
  const th=sections[1].querySelector(`th[data-k="${sortKey}"] .arrow`);if(th)th.textContent=sortDir>0?"↑":"↓";
  sections[1].querySelector("#count").textContent=rows.length+" products";
  tb.innerHTML=rows.map((p,i)=>`
    <tr class="prod" data-i="${i}">
      <td><b>${esc(p.name)}</b></td>
      <td><span class="brandtag" style="color:${BCOLOR[p.brand]}">${p.brand}</span></td>
      <td>${p.cat==="smart_helmet"?`<span class="badge b-partial">smart helmet</span>`:esc(p.tier||"—")}</td>
      <td class="price">${fmt$(p.msrp_usd)}</td>
      <td class="price">${p.street_price_usd!=null&&p.msrp_usd!=null&&p.street_price_usd<p.msrp_usd?`<b>${fmt$(p.street_price_usd)}</b>`:fmt$(p.street_price_usd)}</td>
      <td class="small">${esc((p.intercom_tech||"—").slice(0,60))}</td>
      <td>${p.range_km??"—"}</td><td>${p.max_riders??"—"}</td><td>${p.talk_time_hours??"—"}</td>
      <td class="small">${esc((p.waterproof||"—").slice(0,26))}</td><td>${p.release_year??"—"}</td>
    </tr>
    <tr class="expand" style="display:none"><td colspan="11">
      <b>Features:</b> ${(p.features||[]).map(esc).join(" · ")||"—"}<br>
      ${p.notes?`<span class="muted"><b>Notes:</b> ${esc(p.notes)}</span>`:""}
    </td></tr>`).join("");
  tb.querySelectorAll("tr.prod").forEach(r=>r.onclick=()=>{const e=r.nextElementSibling;e.style.display=e.style.display==="none"?"":"none"});
}
renderTable();

/* ---------- Battles (deck-style segment head-to-heads) ---------- */
const BAT=DATA.battles;
const SC={good:["GOOD","#0f2b17","#56d364"],soso:["SO-SO","#3b2300","#f0a83a"],bad:["BAD/NONE","#3d1418","#ff7b72"]};
let batMode="rank",curBattle=0;
const scell=(s,v)=>{const[t,bg,fg]=SC[s]||["?","#222","#999"];const show=(batMode==="value"&&v!=null&&v!=="")?v:t;return `<td style="background:${bg};color:${fg};font-weight:700;font-size:11px;letter-spacing:.3px;text-align:center">${esc(show)}</td>`};
sections[2].innerHTML=`
  <div class="note-banner">Deck-style segment battles (format of the internal “Competitive Landscape” deck): each Cardo model vs its direct segment rivals, rated <b style="color:#56d364">GOOD</b> / <b style="color:#f0a83a">SO-SO</b> / <b style="color:#ff7b72">BAD-NONE</b> across 16 dimensions. Use the <b>Rank / Value</b> toggle to swap the ratings for the actual figures (riders, range, price…). Hover dimension names for sub-criteria. * = pending testing/verification.</div>
  <div class="chips" id="batChips">${BAT.battles.map((b,i)=>`<button class="chip${i===0?" on":""}" data-i="${i}">${esc(b.hero.model.split(" (")[0].split(" /")[0])}<span class="muted" style="font-weight:400"> · ${esc(b.segment)}</span></button>`).join("")}</div>
  <div class="chips" style="margin-top:-6px"><span class="small muted" style="align-self:center">Cells:</span><button class="chip on" id="modeRank">Rank</button><button class="chip" id="modeVal">Value</button></div>
  <div id="batBody"></div>`;
function renderBattle(i){
  curBattle=i;
  const b=BAT.battles[i];
  const legend=BAT.dimensions_legend;
  sections[2].querySelectorAll("#batChips .chip").forEach((c,j)=>c.classList.toggle("on",i===j));
  sections[2].querySelector("#batBody").innerHTML=`
  <div class="card" style="margin-bottom:16px">
    <h3>${dot("Cardo")}${esc(b.title)} <span class="badge" style="background:var(--panel2);color:var(--muted)">${esc(b.segment)}</span></h3>
    <div class="small" style="margin:4px 0 8px"><b style="color:var(--cardo)">${esc(b.hero.model)}</b> — ${esc(b.hero.price)}</div>
    <div class="small"><b>Executive summary:</b> ${esc(b.exec_summary)}</div>
  </div>
  <div class="card" style="padding:0;overflow-x:auto;margin-bottom:16px">
    <table class="matrix"><thead><tr><th style="min-width:120px">Dimension</th>${b.ratings.models.map(([br,m])=>`<th style="color:${BCOLOR[br]};min-width:110px">${esc(m)}</th>`).join("")}<th style="min-width:180px">Notes</th></tr></thead>
    <tbody>${b.ratings.rows.map(r=>`<tr><td title="${esc(legend[r.dimension]||"")}" style="cursor:help"><b class="small">${esc(r.dimension)}</b></td>${r.scores.map((s,ci)=>scell(s,(r.values||[])[ci])).join("")}<td class="small muted" style="text-align:left">${esc(r.note||"")}</td></tr>`).join("")}</tbody></table>
  </div>
  <div class="grid g2">
  ${b.matchups.map(m=>`
    <div class="card">
      <h3>${dot(m.brand)}<span style="color:${BCOLOR[m.brand]}">${esc(m.brand)} ${esc(m.model)}</span><span class="price" style="margin-left:auto">${esc(m.price)}</span></h3>
      <div class="small muted" style="margin-bottom:10px">${esc(m.blurb)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><div class="small" style="color:var(--ok);font-weight:700;margin-bottom:4px">CARDO'S ADVANTAGE</div><ul class="tight small">${m.cardo_advantage.map(a=>`<li>${esc(a)}</li>`).join("")}</ul></div>
        <div><div class="small" style="color:var(--bad);font-weight:700;margin-bottom:4px">COMPETITOR'S ADVANTAGE</div><ul class="tight small">${m.competitor_advantage.map(a=>`<li>${esc(a)}</li>`).join("")}</ul></div>
      </div>
      ${m.to_test&&m.to_test.length?`<div class="small muted" style="margin-top:10px">* Will be tested: ${m.to_test.map(esc).join("; ")}</div>`:""}
    </div>`).join("")}
  </div>`;
}
sections[2].querySelectorAll("#batChips .chip").forEach(c=>c.onclick=()=>renderBattle(Number(c.dataset.i)));
function setMode(m){batMode=m;sections[2].querySelector("#modeRank").classList.toggle("on",m==="rank");sections[2].querySelector("#modeVal").classList.toggle("on",m==="value");renderBattle(curBattle)}
sections[2].querySelector("#modeRank").onclick=()=>setMode("rank");
sections[2].querySelector("#modeVal").onclick=()=>setMode("value");
renderBattle(0);

/* ---------- Model Compare ---------- */
const pkey = p => p.brand+"|"+p.name;
const PRESETS = {
  "Flagship battle":["Cardo|Packtalk Pro","Cardo|Packtalk Edge","Sena|60S EVO","Reso|Reso Pilot Pro","ASMAX|F1s"],
  "Mid-range battle":["Cardo|Packtalk Neo","Cardo|Freecom 4x","Sena|50S","Sena|Spider RT1 / ST1","Reso|Reso Pilot Neo","ASMAX|F1 Pro"],
  "Entry battle":["Cardo|Spirit","Cardo|Spirit HD","Sena|5S","Sena|5R LITE","ASMAX|S1"],
  "Smart helmets":["Cardo|Beyond GTS (smart helmet)","Cardo|Venture (integrated MX helmet)"]
};
let selModels=new Set(PRESETS["Flagship battle"]);
sections[3].innerHTML=`
  <div class="chips" id="presetChips">${Object.keys(PRESETS).map((k,i)=>`<button class="chip${i===0?" on":""}" data-p="${k}">${k}</button>`).join("")}<span class="small muted">or pick models below (max 7)</span></div>
  <div class="card" style="margin-bottom:16px"><div id="modelPicker" style="display:flex;flex-direction:column;gap:6px">

  <div id="fwTimeline"></div>`;
function fwProductOptions(){
  const prods=Array.from(new Set(FW.filter(u=>fwBrands.has(u.brand)).map(u=>u.product).filter(Boolean))).sort();
  const sel=sections[7].querySelector("#fwProdSel");
  const cur=sel.value;
  sel.innerHTML=`<option value="all">All products</option>`+prods.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join("");
  sel.value=prods.includes(cur)?cur:"all";
}
function renderFW(){
  fwProductOptions();
  const rows=FW.filter(u=>fwBrands.has(u.brand)&&(fwType==="all"||u.type===fwType)&&(fwProduct==="all"||u.product===fwProduct)&&(!fwQ||[u.title,u.version,u.product,(u.changes||[]).join(" "),u.source].join(" ").toLowerCase().includes(fwQ)));
  sections[7].querySelector("#fwCount").textContent=`· ${rows.length} updates`;
  sections[7].querySelector("#fwTimeline").innerHTML=rows.map(u=>{
    const[bg,fg]=FWCOL[u.type]||["#222","#999"];
    return `
    <div class="card" style="margin-bottom:12px;border-left:3px solid ${BHEX[u.brand]}">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        <span class="small muted" style="font-variant-numeric:tabular-nums;font-weight:700">${esc(u.date||"—")}</span>
        <span class="brandtag small" style="color:${BCOLOR[u.brand]}">${esc(u.brand)}</span>
        <span class="badge" style="background:${bg};color:${fg}">${esc(FW_TYPE_LABEL[u.type]||u.type||"update")}</span>
        ${u.version?`<span class="badge" style="background:var(--panel2);color:var(--text)">v${esc(u.version)}</span>`:""}
        <span style="font-weight:700">${esc(u.title||"")}</span>
        ${u.product?`<span class="small muted">— ${esc(u.product)}</span>`:""}
      </div>
      ${u.changes&&u.changes.length?`<ul class="tight small" style="margin-bottom:6px">${u.changes.map(c=>`<li>${esc(c)}</li>`).join("")}</ul>`:""}
      <div class="small muted">${esc(u.source||"")}${u.url?` · <a href="${esc(u.url)}" target="_blank">source ↗</a>`:""}</div>
    </div>`}).join("")||`<div class="card muted" style="padding:24px;text-align:center">No updates match the filters.</div>`;
}
sections[7].querySelectorAll(".chip[data-fb]").forEach(c=>c.onclick=()=>{const b=c.dataset.fb;c.classList.toggle("on");c.classList.contains("on")?fwBrands.add(b):fwBrands.delete(b);renderFW()});
sections[7].querySelectorAll(".chip[data-ft]").forEach(c=>c.onclick=()=>{fwType=c.dataset.ft;sections[7].querySelectorAll(".chip[data-ft]").forEach(x=>x.classList.toggle("on",x===c));renderFW()});
sections[7].querySelector("#fwProdSel").onchange=e=>{fwProduct=e.target.value;renderFW()};
sections[7].querySelector("#fwQ").oninput=e=>{fwQ=e.target.value.toLowerCase();renderFW()};
renderFW();

show(0);
</script>
</body>
</html>
